name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds disabled temporarily - needs fixing
          # - platform: 'macos-latest'
          #   args: '--target aarch64-apple-darwin'
          #   target: 'aarch64-apple-darwin'
          # - platform: 'macos-latest'
          #   args: '--target x86_64-apple-darwin'
          #   target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: setup Rust environment
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          rustup target add ${{ matrix.target }} || true

      - name: verify Rust installation
        shell: bash
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build Tauri app
        uses: tauri-apps/tauri-action@action-v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PenPal Draw ${{ github.ref_name }}'
          releaseBody: |
            ## PenPal Draw ${{ github.ref_name }}
            
            A drawing app for XPPen Artist 15.6 Pro V2 and other pen tablets.
            
            ### Features
            - 🎨 Pressure-sensitive drawing
            - 🖌️ 7 preset brushes + custom brush creator
            - 🔧 Advanced tools: eraser, smudge, blur, dodge, burn
            - 🔀 10 blend modes
            - ⌨️ XPPen shortcut key support
            - ❓ In-app help system
            
            ### Installation
            
            **Windows:**
            - Download `.msi` or `.exe` and run
            
            **Linux:**
            - `.AppImage`: `chmod +x *.AppImage && ./*.AppImage`
            - `.deb`: `sudo dpkg -i *.deb`
            
            ### System Requirements
            - Windows 10/11, or Ubuntu 20.04+
            
            *Note: macOS builds temporarily unavailable*
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
