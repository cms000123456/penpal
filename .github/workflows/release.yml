name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: setup Rust environment
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          rustup target add ${{ matrix.target }} || true

      - name: verify Rust installation
        shell: bash
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install dependencies (macos only)
        if: contains(matrix.platform, 'macos')
        run: |
          # Create icon.icns from icon.png for macOS
          mkdir -p src-tauri/icons/icon.iconset
          sips -z 16 16     src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_16x16.png
          sips -z 32 32     src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_32x32.png
          sips -z 64 64     src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_128x128.png
          sips -z 256 256   src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_256x256.png
          sips -z 512 512   src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_512x512.png
          sips -z 1024 1024 src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_512x512@2x.png
          iconutil -c icns src-tauri/icons/icon.iconset -o src-tauri/icons/icon.icns
          rm -rf src-tauri/icons/icon.iconset

      - name: install frontend dependencies
        run: npm install

      - name: setup Apple signing (macOS only)
        if: contains(matrix.platform, 'macos')
        shell: bash
        run: |
          # Disable code signing for CI builds (optional, allows local/unsigned builds)
          echo "TAURI_SIGNING_PRIVATE_KEY=" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> $GITHUB_ENV
          # Allow building without a signing identity
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: build Tauri app
        uses: tauri-apps/tauri-action@v0.4.14
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PenPal Draw ${{ github.ref_name }}'
          releaseBody: |
            ## PenPal Draw ${{ github.ref_name }}
            
            A drawing app for XPPen Artist 15.6 Pro V2 and other pen tablets.
            
            ### Features
            - 🎨 Pressure-sensitive drawing
            - 🖌️ 7 preset brushes + custom brush creator
            - 🔧 Advanced tools: eraser, smudge, blur, dodge, burn
            - 🔀 10 blend modes
            - ⌨️ XPPen shortcut key support
            - ❓ In-app help system
            
            ### Installation
            
            **Windows:**
            - Download `.msi` or `.exe` and run
            
            **macOS:**
            - Download `.dmg` and drag to Applications
            
            **Linux:**
            - `.AppImage`: `chmod +x *.AppImage && ./*.AppImage`
            - `.deb`: `sudo dpkg -i *.deb`
            
            ### System Requirements
            - Windows 10/11, macOS 11+, or Ubuntu 20.04+
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
